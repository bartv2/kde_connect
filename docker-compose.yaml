services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2026.1.3
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
     # - /run/dbus:/run/dbus:ro
    ports:
     - "8123:8123"
    # restart: unless-stopped
    # privileged: true
    # network_mode: host
    environment:
      TZ: Europe/Amsterdam
